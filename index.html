<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Колобок</title>
		<meta property="og:title" content="Колобок"/>
		<meta property="og:url" content="./index.html"/>
		<meta property="og:image" content="./assets/meta/KolobokShare.png"/>
		<meta property="og:type" content="website"/>
		<meta property="og:site_name" content="Kolobok"/>
		<meta name="theme-color" content="#000000"/>
		<meta name="mobile-web-app-capable" content="yes"/>
		<meta name="apple-mobile-web-app-capable" content="yes"/>
		<link rel="icon" sizes="16x16" type="image/png" href="assets/meta/KolobokFavIcon_16x16.png"/>
		<link rel="icon" sizes="192x192" type="image/png" href="assets/meta/KolobokFavIcon_192x192.png"/>
		<link rel="apple-touch-icon" href="assets/meta/KolobokFavIcon_192x192.png"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
		<style>
			html,body{background-color:black;height:100%;padding:0;margin:0;overflow:hidden;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
			#content{position:fixed;height:100%;width:100%;margin:0;padding:0;border:none;display:none}

			@media only screen and (orientation:portrait)
				{
				#content{position:fixed;transform:rotate(-90deg);transform-origin:left top;width:100vh;overflow-x:hidden;top:100%;left:0}
				}
		</style>
	</head>
	<body>
		<iframe id="content" src="about:blank"></iframe>
		<script>

			function resizeContent()
				{
				var w = window.innerWidth;
				var h = window.innerHeight;

				if(window.innerHeight > window.innerWidth)
					{
					document.getElementById("content").style.width = h + "px";
					document.getElementById("content").style.height = w + "px";
					}
					else
					{
					document.getElementById("content").style.width = w + "px";
					document.getElementById("content").style.height = h + "px";
					}
				}

			window.addEventListener("load", function()
				{
				if (window.location.protocol === "file:")
					{
					document.body.innerHTML = "<div style='color:#fff;font-family:sans-serif;padding:20px'>Run this game through HTTP (not file://).<br>Use: ./scripts/serve.sh and open http://127.0.0.1:8080/index.html</div>";
					return;
					}

				if (window.top == window.self)
					{
					resizeContent();

					setInterval(function()
						{
						resizeContent();
						document.getElementById("content").focus();
						}, 250);

					document.getElementById("content").src = "KolobokGame.htm";
					document.getElementById("content").style.display = "block";
					}
				});

			window.addEventListener("resize", function()
				{
				resizeContent();
				});

			var supportsOrientationChange = "onorientationchange" in window, orientationEvent = supportsOrientationChange ? "orientationchange" : "resize";
			window.addEventListener(orientationEvent, function()
				{
				resizeContent();
				}, false);

			if ("serviceWorker" in navigator)
				{
				navigator.serviceWorker.register("worker.js").then(function(registration)
					{
					}).catch(function(err)
					{
					});
				}
		</script>
	</body>
</html>
